<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#ff6b2b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PrintBase"/>
<title>PrintBase Pro</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26; --border:#2a2a3d;
  --accent:#ff6b2b; --accent-dim:#ff6b2b22; --accent-glow:#ff6b2b44;
  --blue:#4a9eff; --green:#2ecc71; --yellow:#f1c40f; --red:#e74c3c;
  --purple:#9b59b6; --teal:#1abc9c;
  --text:#e8e8f0; --text-dim:#8888aa; --text-muted:#55556a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:100}
#content{flex:1;overflow-y:auto;padding:20px 16px 110px}
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;background:none;border:none;cursor:pointer;color:var(--text-muted);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:0.5px;transition:color 0.15s}
.nav-btn.active{color:var(--accent)}
.nav-btn .icon{font-size:18px;line-height:1}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:7px;display:grid;place-items:center;font-size:16px;flex-shrink:0}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-0.5px}
.logo-tag{color:var(--text-muted);font-size:9px;letter-spacing:2px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hbadge{border-radius:6px;padding:3px 8px;font-size:10px}
.section-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
.section-sub{color:var(--text-dim);font-size:11px;margin-bottom:20px}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden}
.stat-label{color:var(--text-dim);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;line-height:1}
.stat-sub{color:var(--text-muted);font-size:10px;margin-top:3px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.card-title{font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:14px}
.order-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #ffffff08}
.order-row:last-child{border-bottom:none}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-family:'Space Mono',monospace;white-space:nowrap;display:inline-block}
.badge-completed{background:#2ecc7122;color:var(--green)}
.badge-inprogress{background:#4a9eff22;color:var(--blue)}
.badge-pending{background:#f1c40f22;color:var(--yellow)}
.filament-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.filament-card.low{border-color:#e74c3c44}
.filament-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.filament-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.filament-name{font-size:14px;font-weight:700;font-family:'Syne',sans-serif}
.filament-brand{font-size:11px;color:var(--text-dim)}
.low-tag{font-size:9px;color:var(--red);background:#e74c3c22;padding:2px 7px;border-radius:10px;flex-shrink:0}
.bar-track{height:5px;background:var(--border);border-radius:3px;margin:6px 0 4px}
.bar-fill{height:100%;border-radius:3px;transition:width 0.3s}
.fmeta{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:9px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}
.fi{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:9px 12px;font-size:13px;font-family:'Space Mono',monospace;width:100%;outline:none;transition:border-color 0.15s}
.fi:focus{border-color:var(--accent)}
select.fi{cursor:pointer}
.form-actions{display:flex;gap:8px;margin-top:14px}
.btn{border:none;border-radius:8px;padding:11px 18px;cursor:pointer;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;transition:all 0.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{transform:scale(0.97);background:#e05a1f}
.btn-primary:disabled{background:var(--border);cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:active{background:var(--surface2)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:8px 14px;font-size:11px}
.panel{background:var(--surface);border:1px solid var(--accent-glow);border-radius:10px;padding:16px;margin-bottom:16px}
.panel-title{font-size:10px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:14px}
.section-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px}
.insight-card{background:var(--surface);border-radius:8px;padding:13px 15px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start}
.insight-text{font-size:13px;line-height:1.6}
.ai-empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:13px}
.ai-empty .big{font-size:36px;display:block;margin-bottom:12px}
.chat-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;height:260px;overflow-y:auto;margin-bottom:10px}
.msg{display:flex;margin-bottom:12px}
.msg.user{justify-content:flex-end}
.msg-bubble{max-width:85%;padding:10px 13px;border-radius:12px;font-size:12.5px;line-height:1.6}
.msg.user .msg-bubble{background:var(--accent-dim);border:1px solid var(--accent-glow);color:var(--accent);border-radius:12px 12px 2px 12px}
.msg.ai .msg-bubble{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:12px 12px 12px 2px}
.chat-input-row{display:flex;gap:8px}
textarea.fi{resize:none;line-height:1.5}
.send-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0 16px;font-size:18px;cursor:pointer;align-self:stretch;transition:all 0.15s;flex-shrink:0}
.send-btn:active{transform:scale(0.95)}
.send-btn:disabled{background:var(--border);cursor:not-allowed}
.typing{display:flex;gap:4px;padding:8px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1s infinite}
.dot:nth-child(2){animation-delay:0.15s}
.dot:nth-child(3){animation-delay:0.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.del-btn{background:transparent;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px 6px;border-radius:6px;line-height:1;transition:all 0.15s;flex-shrink:0}
.del-btn:active{background:#e74c3c22;color:var(--red)}
.modal-bg{position:fixed;inset:0;background:#000000aa;z-index:300;display:flex;align-items:flex-end}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:24px 20px 32px;width:100%}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:8px}
.modal-sub{color:var(--text-dim);font-size:12px;margin-bottom:20px;line-height:1.5}
.modal-actions{display:flex;gap:10px}
input[type=color]{padding:2px;height:38px;cursor:pointer}
.qbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);border-radius:6px;padding:7px 10px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;flex-shrink:0}
.order-full-row{padding:14px 16px;border-bottom:1px solid #ffffff08;display:flex;flex-direction:column;gap:6px}
.order-full-row:last-child{border-bottom:none}
.order-top{display:flex;justify-content:space-between;align-items:flex-start}
.order-bottom{display:flex;gap:12px;font-size:11px;color:var(--text-dim);flex-wrap:wrap}
/* CHART */
.chart-wrap{overflow-x:auto;padding-bottom:4px}
svg text{font-family:'Space Mono',monospace}
/* TIMER */
.timer-display{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;text-align:center;letter-spacing:-2px;color:var(--accent);padding:20px 0}
.timer-controls{display:flex;gap:10px;justify-content:center}
/* TABS inside page */
.sub-tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;padding-bottom:2px}
.sub-tab{background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:20px;padding:6px 14px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
.sub-tab.active{background:var(--accent-dim);border-color:var(--accent-glow);color:var(--accent)}
/* INVOICE */
.invoice-preview{background:#fff;color:#000;border-radius:10px;padding:24px;font-family:'Space Mono',monospace;font-size:12px}
/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 18px;font-size:12px;color:var(--text);z-index:500;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px #00000066}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
/* SEARCH */
.search-bar{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0 12px;margin-bottom:14px;gap:8px}
.search-bar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;padding:9px 0}
.search-bar .si{color:var(--text-muted);font-size:14px}
/* EDIT FORM */
.edit-panel{background:var(--surface2);border:1px solid var(--accent-glow);border-radius:10px;padding:14px;margin-top:10px}
/* COUNTDOWN */
.timer-display.countdown{color:var(--blue)}
.timer-display.done{color:var(--green)}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <span class="logo-name">PRINTBASE</span>
      <span class="logo-tag">PRO</span>
    </div>
    <div class="header-right">
      <div id="alert-badge" class="hbadge" style="display:none;background:#f1c40f22;border:1px solid #f1c40f44;color:var(--yellow)"></div>
      <div class="logo-icon" style="cursor:pointer;font-size:13px;font-weight:700" onclick="switchTab('settings')">⚙</div>
    </div>
  </div>
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" data-tab="dashboard" onclick="switchTab('dashboard')"><span class="icon">⊞</span>DASH</button>
    <button class="nav-btn" data-tab="orders" onclick="switchTab('orders')"><span class="icon">📋</span>ORDERS</button>
    <button class="nav-btn" data-tab="filament" onclick="switchTab('filament')"><span class="icon">🧵</span>STOCK</button>
    <button class="nav-btn" data-tab="customers" onclick="switchTab('customers')"><span class="icon">👥</span>CLIENTS</button>
    <button class="nav-btn" data-tab="finance" onclick="switchTab('finance')"><span class="icon">💰</span>FINANCE</button>
    <button class="nav-btn" data-tab="tools" onclick="switchTab('tools')"><span class="icon">🔧</span>TOOLS</button>
    <button class="nav-btn" data-tab="ai" onclick="switchTab('ai')"><span class="icon">✦</span>AI</button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let S = {
  tab:'dashboard', subTab:{},
  filaments:[], orders:[], printedItems:[], customers:[], expenses:[],
  noteTemplates:[], suppliers:[],
  showForms:{},
  aiInsights:[], aiLoading:false, chatMessages:[], chatLoading:false,
  apiKey:'', showApiKey:false,
  timer:{running:false,seconds:0,label:'',countdown:false,countdownFrom:0},
  goalMonthly:0,
  search:{orders:'',customers:''},
  toast:null,
  editing:{},
};
let timerInterval=null;

// ═══════════════════════════════════════════════
// PERSIST
// ═══════════════════════════════════════════════
function save(){
  try{localStorage.setItem('pb2',JSON.stringify({
    filaments:S.filaments, orders:S.orders, printedItems:S.printedItems,
    customers:S.customers, expenses:S.expenses, goalMonthly:S.goalMonthly,
    noteTemplates:S.noteTemplates, suppliers:S.suppliers,
  }));}catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('pb2'));
    if(d){
      S.filaments=d.filaments||[]; S.orders=d.orders||[];
      S.printedItems=d.printedItems||[]; S.customers=d.customers||[];
      S.expenses=d.expenses||[]; S.goalMonthly=d.goalMonthly||0;
      S.noteTemplates=d.noteTemplates||[]; S.suppliers=d.suppliers||[];
    }
  }catch(e){}
  try{S.apiKey=localStorage.getItem('pb_apikey')||'';}catch(e){}
}
function exportData(){
  const blob=new Blob([JSON.stringify({
    filaments:S.filaments,orders:S.orders,printedItems:S.printedItems,
    customers:S.customers,expenses:S.expenses,
    noteTemplates:S.noteTemplates,suppliers:S.suppliers
  },null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='printbase-backup.json'; a.click();
  showToast('Backup exported ✓','success');
}
function importData(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.orders) S.orders=d.orders;
      if(d.filaments) S.filaments=d.filaments;
      if(d.printedItems) S.printedItems=d.printedItems;
      if(d.customers) S.customers=d.customers;
      if(d.expenses) S.expenses=d.expenses;
      save(); render(); alert('Data imported!');
    }catch(e){alert('Invalid file');}
  };
  r.readAsText(f);
}

// ═══════════════════════════════════════════════
// COMPUTED
// ═══════════════════════════════════════════════
function C(){
  const rev=S.orders.reduce((s,o)=>s+o.revenue,0);
  const cost=S.orders.reduce((s,o)=>s+o.cost,0);
  const expTotal=S.expenses.reduce((s,e)=>s+e.amount,0);
  const profit=rev-cost-expTotal;
  const margin=rev?Math.round(profit/rev*100):0;
  const active=S.orders.filter(o=>o.status!=='Completed').length;
  const low=S.filaments.filter(f=>f.weight/f.total<0.3);
  const lowPrinted=S.printedItems.filter(p=>p.qty<=p.lowAt);
  const now=new Date(); const mo=now.getMonth(); const yr=now.getFullYear();
  const moRev=S.orders.filter(o=>{const d=new Date(o.date);return d.getMonth()===mo&&d.getFullYear()===yr;}).reduce((s,o)=>s+o.revenue,0);
  return{rev,cost,expTotal,profit,margin,active,low,lowPrinted,moRev};
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function badge(status){
  const m={'Completed':'completed','In Progress':'inprogress','Pending':'pending'};
  const l={'Completed':'● Done','In Progress':'◐ Active','Pending':'○ Pending'};
  return`<span class="badge badge-${m[status]||'pending'}">${l[status]||status}</span>`;
}
function statCard(label,value,sub,accent){
  return`<div class="stat-card" style="border-left:3px solid ${accent}">
    <div class="stat-label">${label}</div>
    <div class="stat-value" style="color:${accent}">${value}</div>
    ${sub?`<div class="stat-sub">${sub}</div>`:''}
  </div>`;
}
function fmt(n){return'$'+Number(n).toLocaleString();}
function empty(msg){return`<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:12px;line-height:1.8">${msg}</div>`;}
let _toastTimer=null;
function showToast(msg,type=''){
  const el=document.getElementById('toast');
  if(!el)return;
  el.textContent=msg; el.className='toast'+(type?' '+type:'');
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}
function subTabs(id,tabs){
  const cur=S.subTab[id]||tabs[0].id;
  return`<div class="sub-tabs">${tabs.map(t=>`<button class="sub-tab${cur===t.id?' active':''}" onclick="S.subTab['${id}']='${t.id}';render()">${t.label}</button>`).join('')}</div>`;
}
function curSubTab(id,def){return S.subTab[id]||def;}

// ═══════════════════════════════════════════════
// CONFIRM MODAL
// ═══════════════════════════════════════════════
function showConfirm(title,sub,onConfirm){
  const ex=document.getElementById('modal-bg'); if(ex) ex.remove();
  const el=document.createElement('div'); el.className='modal-bg'; el.id='modal-bg';
  el.innerHTML=`<div class="modal">
    <div class="modal-title">${title}</div>
    <div class="modal-sub">${sub}</div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="mc" style="flex:1">Delete</button>
      <button class="btn btn-ghost" id="mx" style="flex:1">Cancel</button>
    </div></div>`;
  document.body.appendChild(el);
  document.getElementById('mc').onclick=()=>{el.remove();onConfirm();};
  document.getElementById('mx').onclick=()=>el.remove();
  el.onclick=e=>{if(e.target===el)el.remove();};
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render(){
  const c=C();
  const ab=document.getElementById('alert-badge');
  const now_=new Date();
  const overdueCount=S.orders.filter(o=>o.dueDate&&o.status!=='Completed'&&new Date(o.dueDate)<now_).length;
  const alerts=(c.low.length+c.lowPrinted.length+overdueCount);
  if(alerts>0){ab.style.display='';ab.textContent=`⚠ ${alerts}`;}else ab.style.display='none';
  const content=document.getElementById('content');
  const tabs={
    dashboard:renderDashboard,orders:renderOrders,filament:renderFilament,
    printed:renderPrinted,customers:renderCustomers,finance:renderFinance,
    tools:renderTools,ai:renderAI,settings:renderSettings,suppliers:renderSuppliers
  };
  content.innerHTML=(tabs[S.tab]||renderDashboard)(c);
}

// ═══════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════
function renderDashboard(c){
  const moGoalBar=S.goalMonthly>0?`
    <div class="card">
      <div class="card-title">Monthly Goal — ${new Date().toLocaleString('default',{month:'long'})}</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px">
        <span style="color:var(--text-dim)">${fmt(c.moRev)} earned</span>
        <span style="color:var(--accent)">${fmt(S.goalMonthly)} goal</span>
      </div>
      <div class="bar-track" style="height:8px">
        <div class="bar-fill" style="width:${Math.min(100,Math.round(c.moRev/S.goalMonthly*100))}%;background:${c.moRev>=S.goalMonthly?'var(--green)':'var(--accent)'}"></div>
      </div>
      <div style="font-size:10px;color:var(--text-muted);margin-top:5px;text-align:right">${Math.min(100,Math.round(c.moRev/S.goalMonthly*100))}% complete</div>
    </div>`:'';

  const recentOrders=S.orders.length===0
    ?`<div style="text-align:center;padding:24px 16px">
      <div style="font-size:32px;margin-bottom:12px">🖨️</div>
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:16px;line-height:1.7">No orders yet — get started by adding your first order, filament, or customer.</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="switchTab('orders')">+ Add First Order</button>
        <button class="btn btn-ghost btn-sm" onclick="switchTab('filament')">+ Add Filament</button>
      </div>
    </div>`
    :S.orders.slice(0,4).map(o=>`
      <div class="order-row">
        <div><div style="font-size:13px">${o.client}</div><div style="font-size:11px;color:var(--text-dim)">${o.item}</div></div>
        <div style="text-align:right"><div style="color:var(--accent);font-weight:700">$${o.revenue}</div>${badge(o.status)}</div>
      </div>`).join('');

  const filBars=S.filaments.length===0
    ?empty('No filaments added')
    :S.filaments.map(f=>{
      const pct=Math.round(f.weight/f.total*100);
      const bc=pct<30?'var(--red)':pct<60?'var(--yellow)':'var(--green)';
      return`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <div style="display:flex;align-items:center;gap:7px">
            <div style="width:9px;height:9px;border-radius:50%;background:${f.color}"></div>
            <span style="font-size:11px">${f.name}</span>
          </div>
          <span style="font-size:10px;color:${pct<30?'var(--red)':'var(--text-dim)'}">${f.weight}g (${pct}%)</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${bc}"></div></div>
      </div>`;
    }).join('');

  const stockAlerts=S.printedItems.filter(p=>p.qty<=p.lowAt);
  const now2=new Date();
  const overdueOrders=S.orders.filter(o=>o.dueDate&&o.status!=='Completed'&&new Date(o.dueDate)<now2);
  const dueSoonOrders=S.orders.filter(o=>{
    if(!o.dueDate||o.status==='Completed') return false;
    const diff=Math.ceil((new Date(o.dueDate)-now2)/(1000*60*60*24));
    return diff>=0&&diff<=2;
  });

  return`
    <h1 class="section-title">Overview</h1>
    <p class="section-sub">All-time business performance</p>
    <div class="stats-row">
      ${statCard('Revenue',S.orders.length?fmt(c.rev):'$0','all time','var(--accent)')}
      ${statCard('Profit',S.orders.length?fmt(c.profit):'$0',c.margin+'% margin','var(--green)')}
      ${statCard('Active Orders',c.active||'0','pending + in progress','var(--blue)')}
      ${statCard('This Month',fmt(c.moRev),'revenue','var(--purple)')}
    </div>
    ${moGoalBar}
    ${overdueOrders.length?`<div class="card" style="border-color:var(--red)44">
      <div class="card-title" style="color:var(--red)">⚠ Overdue Orders</div>
      ${overdueOrders.map(o=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #ffffff08;font-size:12px">
        <span>${o.client} — ${o.item}</span><span style="color:var(--red)">Due ${o.dueDate}</span>
      </div>`).join('')}
    </div>`:''}
    ${dueSoonOrders.length?`<div class="card" style="border-color:var(--yellow)44">
      <div class="card-title" style="color:var(--yellow)">⏰ Due Soon</div>
      ${dueSoonOrders.map(o=>{const diff=Math.ceil((new Date(o.dueDate)-now2)/(1000*60*60*24));return`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #ffffff08;font-size:12px">
        <span>${o.client} — ${o.item}</span><span style="color:var(--yellow)">${diff===0?'Today':diff+'d'}</span>
      </div>`;}).join('')}
    </div>`:''}
    ${stockAlerts.length?`<div class="card" style="border-color:var(--red)44">
      <div class="card-title" style="color:var(--red)">⚠ Low Stock Alerts</div>
      ${stockAlerts.map(p=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #ffffff08;font-size:12px">
        <span>${p.name}</span><span style="color:var(--red)">${p.qty} left</span>
      </div>`).join('')}
    </div>`:''}
    <div class="card"><div class="card-title">Recent Orders</div>${recentOrders}</div>
    ${(()=>{
      const now3=new Date();
      const next=S.orders.filter(o=>o.dueDate&&o.status!=='Completed').sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate))[0];
      if(!next) return '';
      const diff=Math.ceil((new Date(next.dueDate)-now3)/(1000*60*60*24));
      const overdue=diff<0;
      const color=overdue?'var(--red)':diff<=1?'var(--yellow)':'var(--blue)';
      return`<div class="card" style="border-color:${color}44">
        <div class="card-title" style="color:${color}">⏰ Next Due</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-size:14px;font-weight:700">${next.client}</div><div style="font-size:11px;color:var(--text-dim)">${next.item}</div></div>
          <div style="text-align:right"><div style="font-size:20px;font-weight:800;color:${color};font-family:'Syne',sans-serif">${overdue?'OVERDUE':diff===0?'TODAY':diff+'d'}</div><div style="font-size:10px;color:var(--text-muted)">${next.dueDate}</div></div>
        </div>
      </div>`;
    })()}
    <div class="card"><div class="card-title">Filament Levels</div>${filBars}</div>`;
}

  return`

function calcQuote(){
  const g=+document.getElementById('qq-grams')?.value||0;
  const fc=+document.getElementById('qq-filcost')?.value||25;
  const hrs=+document.getElementById('qq-hrs')?.value||0;
  const rate=+document.getElementById('qq-rate')?.value||10;
  const markup=+document.getElementById('qq-markup')?.value||30;
  const qty=+document.getElementById('qq-qty')?.value||1;
  const matCost=(g/1000)*fc;
  const timeCost=hrs*rate;
  const baseCost=matCost+timeCost;
  const suggested=baseCost*(1+markup/100);
  const perUnit=suggested;
  const total=perUnit*qty;
  document.getElementById('quote-output').innerHTML=`
    <div style="display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)"><span style="color:var(--text-dim)">Material cost</span><span>$${matCost.toFixed(2)}</span></div>
    <div style="display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)"><span style="color:var(--text-dim)">Time cost</span><span>$${timeCost.toFixed(2)}</span></div>
    <div style="display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)"><span style="color:var(--text-dim)">Base cost</span><span>$${baseCost.toFixed(2)}</span></div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:15px;font-weight:700"><span style="color:var(--accent)">Price per unit</span><span style="color:var(--accent)">$${perUnit.toFixed(2)}</span></div>

function checkRepeatOrder(clientName, itemName){
  if(!clientName||!itemName) return null;
  return S.orders.find(o=>
    o.client.toLowerCase()===clientName.toLowerCase()&&
    o.item.toLowerCase()===itemName.toLowerCase()
  )||null;
}

function stockAwareAddOrder(){
  const pid=+document.getElementById('no-stock-item')?.value||0;
  const qty=+document.getElementById('no-qty')?.value||1;
  if(pid){
    const p=S.printedItems.find(x=>x.id===pid);
    if(p&&p.qty<qty){
      showToast(`⛔ Only ${p.qty} in stock — can't fulfill qty ${qty}`,'error');
      return;
    }
  }
  // repeat order detection
  const client=document.getElementById('no-client')?.value?.trim();
  const item=document.getElementById('no-item')?.value?.trim();
  const prev=checkRepeatOrder(client,item);
  if(prev&&!S._reorderConfirmed){
    showRepeatOrderPrompt(prev,()=>{S._reorderConfirmed=true;stockAwareAddOrder();});
    return;
  }
  S._reorderConfirmed=false;
  addOrder(pid,qty);
}

function showRepeatOrderPrompt(prev, onConfirm){
  const el=document.createElement('div'); el.className='modal-bg'; el.id='repeat-modal';
  el.innerHTML=`<div class="modal">
    <div class="modal-title">🔁 Repeat Order Detected</div>
    <div class="modal-sub">${prev.client} previously ordered <strong>${prev.item}</strong> on ${prev.date} for <strong>$${prev.revenue}</strong>. Pre-fill from that order?</div>
    <div class="modal-actions" style="flex-direction:column;gap:8px">
      <button class="btn btn-primary" id="ro-prefill" style="width:100%">Pre-fill from previous order</button>
      <button class="btn btn-ghost" id="ro-new" style="width:100%">Continue as new order</button>
    </div>
  </div>`;
  document.body.appendChild(el);
  document.getElementById('ro-prefill').onclick=()=>{
    el.remove();
    // pre-fill fields from previous order
    const setVal=(id,v)=>{const e=document.getElementById(id);if(e)e.value=v;};
    setVal('no-rev',prev.revenue); setVal('no-cost',prev.cost);
    setVal('no-time',prev.printTime||0); setVal('no-filament-used',prev.filamentUsed||0);
    setVal('no-notes',prev.notes||''); setVal('no-print-settings',prev.printSettings||'');
    if(prev.material){const m=document.getElementById('no-mat');if(m)m.value=prev.material;}
    showToast('Pre-filled from previous order ✓','success');
    onConfirm();
  };
  document.getElementById('ro-new').onclick=()=>{el.remove();onConfirm();};
  el.onclick=e=>{if(e.target===el){el.remove();}};
}
function onStockItemChange(){
  const sel=document.getElementById('no-stock-item');
  const preview=document.getElementById('no-stock-preview');
  const submitBtn=document.getElementById('no-submit-btn');
  if(!sel||!preview) return;
  const pid=+sel.value;
  const qty=+document.getElementById('no-qty')?.value||1;
  if(!pid){
    preview.innerHTML='';
    if(submitBtn){submitBtn.disabled=false;submitBtn.textContent='Add Order';}
    return;
  }
  const p=S.printedItems.find(x=>x.id===pid);
  if(!p){preview.innerHTML='';return;}
  const after=p.qty-qty;
  if(after<0){
    preview.innerHTML=`<span style="color:var(--red)">⛔ Only ${p.qty} in stock — not enough for qty ${qty}. Restock before ordering.</span>`;
    if(submitBtn){submitBtn.disabled=true;submitBtn.textContent='Insufficient Stock';}
  } else {
    const warn=after<=p.lowAt;
    preview.innerHTML=`<span style="color:${warn?'var(--yellow)':'var(--green)'}">
      ${warn?'⚠':'✓'} ${p.qty} in stock → ${after} after deduction${warn?' (low stock alert)':''}
    </span>`;
    if(submitBtn){submitBtn.disabled=false;submitBtn.textContent='Add Order';}
    // auto-fill item name if blank
    const itemEl=document.getElementById('no-item');
    if(itemEl&&!itemEl.value) itemEl.value=p.name;
  }
}

function stockAwareAddOrder(){
  const pid=+document.getElementById('no-stock-item')?.value||0;
  const qty=+document.getElementById('no-qty')?.value||1;
  if(pid){
    const p=S.printedItems.find(x=>x.id===pid);
    if(p&&p.qty<qty){
      showToast(`⛔ Only ${p.qty} in stock — can't fulfill qty ${qty}`,'error');
      return;
    }
  }
  addOrder(pid, qty);
}

function addOrder(stockItemId, qty){
  const resolvedQty=qty||+document.getElementById('no-qty')?.value||1;
  const o={
    id:Date.now(),
    client:document.getElementById('no-client').value||'Unknown',
    item:document.getElementById('no-item').value||'Item',
    qty:resolvedQty,
    material:document.getElementById('no-mat').value,
    revenue:+document.getElementById('no-rev').value||0,
    cost:+document.getElementById('no-cost').value||0,
    printTime:+document.getElementById('no-time').value||0,
    status:document.getElementById('no-status').value,
    notes:document.getElementById('no-notes').value||'',
    printSettings:document.getElementById('no-print-settings')?.value||'',
    photo:document.getElementById('no-photo-data')?.value||'',
    dueDate:document.getElementById('no-due').value||'',
    filamentUsed:+document.getElementById('no-filament-used').value||0,
    stockItemId:stockItemId||0,
    date:new Date().toISOString().slice(0,10),
  };
  S.orders.unshift(o);
  // auto-add customer
  if(o.client&&!S.customers.find(c=>c.name===o.client)){
    S.customers.push({id:Date.now()+1,name:o.client,email:'',phone:'',notes:''});
  }
  // auto-deduct printed stock
  let toastMsg='Order added ✓';
  let toastType='success';
  if(o.stockItemId){
    const p=S.printedItems.find(x=>x.id===o.stockItemId);
    if(p){
      const newQty=Math.max(0,p.qty-o.qty);
      S.printedItems=S.printedItems.map(x=>x.id===p.id?{...x,qty:newQty}:x);
      const low=newQty<=p.lowAt;
      toastMsg=`Order added · -${o.qty} from "${p.name}" stock (${newQty} left)${low?' ⚠ Low!':''}`;
      toastType=low?'error':'success';
    }
  }
  // auto-deduct filament
  if(o.filamentUsed>0){
    deductFilament(o.material, o.filamentUsed, false);
    if(o.stockItemId===0) toastMsg=`Order added · -${o.filamentUsed}g filament deducted`;
  }
  showToast(toastMsg, toastType);
  S.showForms.addOrder=false; save(); render();
}
function deductFilament(materialName, grams, showMsg){
  if(!materialName||!grams||grams<=0){if(showMsg)showToast('Order added ✓','success');return;}
  const f=S.filaments.find(x=>x.name===materialName);
  if(!f){if(showMsg)showToast('Order added ✓ (material not in inventory)','success');return;}
  const newW=Math.max(0,f.weight-grams);
  S.filaments=S.filaments.map(x=>x.id===f.id?{...x,weight:newW}:x);
  if(showMsg){
    const low=newW<f.total*0.3;
    showToast(`Order added · -${grams}g from ${f.name}${low?' ⚠ Low!':''}`, low?'error':'success');
  }
}

function cycleStatus(id){
  const next={'Pending':'In Progress','In Progress':'Completed','Completed':'Pending'};
  S.orders=S.orders.map(o=>o.id===id?{...o,status:next[o.status]||'Pending'}:o);
  save(); render();
}
function saveEditOrder(id){
  const old=S.orders.find(o=>o.id===id);
  const newMat=document.getElementById('eo-mat').value;
  const newGrams=+document.getElementById('eo-filament').value||0;
  const oldMat=old.material||'';
  const oldGrams=old.filamentUsed||0;
  const newQty=+document.getElementById('eo-qty').value||old.qty;
  const oldQty=old.qty;
  const oldStockId=old.stockItemId||0;

  S.orders=S.orders.map(o=>o.id!==id?o:{...o,
    client:document.getElementById('eo-client').value||o.client,
    item:document.getElementById('eo-item').value||o.item,
    qty:newQty,
    material:newMat,
    revenue:+document.getElementById('eo-rev').value||0,
    cost:+document.getElementById('eo-cost').value||0,
    printTime:+document.getElementById('eo-time').value||0,
    status:document.getElementById('eo-status').value,
    dueDate:document.getElementById('eo-due').value||'',
    filamentUsed:newGrams,
    notes:document.getElementById('eo-notes').value||'',
    printSettings:document.getElementById('eo-print-settings')?.value||o.printSettings||'',
  });

  // reconcile filament
  if(oldMat&&oldGrams>0){
    const f=S.filaments.find(x=>x.name===oldMat);
    if(f) S.filaments=S.filaments.map(x=>x.id===f.id?{...x,weight:Math.min(x.total,x.weight+oldGrams)}:x);
  }
  if(newMat&&newGrams>0){
    const f=S.filaments.find(x=>x.name===newMat);
    if(f) S.filaments=S.filaments.map(x=>x.id===f.id?{...x,weight:Math.max(0,x.weight-newGrams)}:x);
  }

  // reconcile printed stock: restore old qty deduction, apply new qty
  if(oldStockId){
    const p=S.printedItems.find(x=>x.id===oldStockId);
    if(p){
      const restored=p.qty+oldQty;
      if(restored<newQty){
        showToast(`⛔ Only ${restored} in stock after restore — qty not changed`,'error');
        S.printedItems=S.printedItems.map(x=>x.id===oldStockId?{...x,qty:restored-oldQty}:x);
      } else {
        S.printedItems=S.printedItems.map(x=>x.id===oldStockId?{...x,qty:restored-newQty}:x);
      }
    }
  }

  S.editing.order=null; save(); render(); showToast('Order updated ✓','success');
}
function dupOrder(id){
  const o=S.orders.find(x=>x.id===id); if(!o) return;
  S.orders.unshift({...o,id:Date.now(),date:new Date().toISOString().slice(0,10),status:'Pending'});
  save(); render();
}

function copyMsgIdx(i){
  const txt=_msgStore[i]; if(!txt) return;
  const btn=document.getElementById('copybtn-'+i);
  const done=()=>{if(btn){btn.textContent='✓ Copied!';btn.style.background='var(--green)';setTimeout(()=>{btn.textContent='Copy Message';btn.style.background='var(--accent)';},2000);}};
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(done).catch(()=>{fallbackCopy(txt);done();});}
  else{fallbackCopy(txt);done();}
}
function fallbackCopy(txt){
  const ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
}

            style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-family:'Space Mono',monospace;font-size:13px;text-align:center;outline:none;width:0"/>
          <button class="qbtn" onclick="nudgeFilament(${f.id},100)">+100g</button>
          <button class="qbtn" onclick="updateFilament(${f.id},${f.total})" style="color:var(--green)">Full</button>
        </div>
        <div style="font-size:10px;color:var(--text-muted);text-align:center;margin-top:5px">type exact grams or use quick buttons</div>
        ${editForm}
      </div>`;
    }).join('');

  return`
    <div class="section-header">
      <div><h1 class="section-title">Filament</h1><p class="section-sub">${S.filaments.length} materials · ${c.low.length} low</p></div>
      <button class="btn btn-primary btn-sm" onclick="S.showForms.addFilament=!S.showForms.addFilament;render()">+ Add</button>
    </div>
    ${tabs}${form}${cards}`;
}

function updateFilament(id,val){
  S.filaments=S.filaments.map(f=>f.id===id?{...f,weight:Math.min(f.total,Math.max(0,+val))}:f);
  save(); render();
}
function nudgeFilament(id,delta){
  S.filaments=S.filaments.map(f=>{
    if(f.id!==id) return f;
    const newW=delta===f.total?f.total:Math.min(f.total,Math.max(0,f.weight+delta));
    return{...f,weight:newW};
  });
  save(); render();
}
function addFilament(){
  S.filaments.push({
    id:Date.now(),
    name:document.getElementById('nf-name').value||'New Filament',
    brand:document.getElementById('nf-brand').value||'Unknown',

    cost:+document.getElementById('nf-cost').value||25,
    supplier:document.getElementById('nf-supplier').value||'',
    color:document.getElementById('nf-color').value||'#ff6b2b',
  });
  S.showForms.addFilament=false; save(); render(); showToast('Filament added ✓','success');
}
function deleteFilament(id){

}
function saveEditFilament(id){

function renderChart(){
  const data=getMonthlyData().slice(-6);
  if(data.every(d=>d.rev===0)) return empty('No revenue data to chart yet.');
  const W=340; const H=160; const pad=36; const barW=28;
  const n=data.length;
  const totalBarSpace=barW*n;
  const gap=n>1?(W-pad*2-totalBarSpace)/(n-1):0;
  const maxVal=Math.max(...data.map(d=>Math.max(d.rev,d.profit||0)),1);
  const bars=data.map((d,i)=>{
    const bh=Math.round((d.rev/maxVal)*(H-50));
    const ph=Math.round(((d.profit||0)/maxVal)*(H-50));
    const x=pad+i*(barW+gap);
    const y=H-24-bh;
    const py=H-24-Math.max(0,ph);
    const isMax=d.rev===Math.max(...data.map(x=>x.rev));
    return`<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="3" fill="${isMax?'#ff6b2b':'#ff6b2b55'}"/>
      ${ph>0?`<rect x="${x+4}" y="${py}" width="${barW-8}" height="${Math.max(0,ph)}" rx="2" fill="#2ecc7166"/>`:''}
      <text x="${x+barW/2}" y="${H-8}" text-anchor="middle" fill="#55556a" font-size="9">${d.label}</text>
      ${bh>18?`<text x="${x+barW/2}" y="${y-4}" text-anchor="middle" fill="#e8e8f0" font-size="8">$${d.rev}</text>`:''}`;
  }).join('');
  const legend=`<text x="${pad}" y="12" fill="#ff6b2b" font-size="9">■ Revenue</text><text x="${pad+70}" y="12" fill="#2ecc71" font-size="9">■ Profit</text>`;
  return`
    <div class="card">
      <div class="card-title">Revenue vs Profit — Last 6 Months</div>
      <div class="chart-wrap">
        <svg width="100%" viewBox="0 0 ${W} ${H}" style="min-width:260px">${legend}${bars}</svg>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Monthly Breakdown</div>
      ${data.map(d=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #ffffff08;font-size:12px">
        <span style="color:var(--text-dim)">${d.label}</span>
        <div style="display:flex;gap:14px">
          <span style="color:var(--accent);font-weight:700">${fmt(d.rev)}</span>
          <span style="color:var(--green)">${fmt(d.profit||0)}</span>
        </div>
      </div>`).join('')}
    </div>`;
}

function getMonthlyData(){
  const months=[];
  const now=new Date();
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const mo=d.getMonth(); const yr=d.getFullYear();
    const moOrders=S.orders.filter(o=>{const od=new Date(o.date);return od.getMonth()===mo&&od.getFullYear()===yr;});
    const rev=moOrders.reduce((s,o)=>s+o.revenue,0);
    const cost=moOrders.reduce((s,o)=>s+o.cost,0);
    const expTotal=S.expenses.filter(e=>{const ed=new Date(e.date);return ed.getMonth()===mo&&ed.getFullYear()===yr;}).reduce((s,e)=>s+e.amount,0);
    months.push({label:d.toLocaleString('default',{month:'short'}),rev,profit:Math.max(0,rev-cost-expTotal)});
  }
  return months;
}
function getTopClient(){
  const map={};
  S.orders.forEach(o=>{map[o.client]=(map[o.client]||0)+o.revenue;});
  const top=Object.entries(map).sort((a,b)=>b[1]-a[1])[0];
  return top?{name:top[0],rev:top[1]}:{name:'',rev:0};
}
function getTopMaterial(){
  const map={};
  S.orders.forEach(o=>{if(o.material)map[o.material]=(map[o.material]||0)+o.revenue;});
  const top=Object.entries(map).sort((a,b)=>b[1]-a[1])[0];
  return top?top[0]:'';
}

function toggleTimer(){
  S.timer.label=document.getElementById('timer-label')?.value||S.timer.label;
  S.timer.running=!S.timer.running;
  if(S.timer.running){
    clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
      if(S.timer.countdown){
        if(S.timer.seconds<=0){
          clearInterval(timerInterval); S.timer.running=false;
          const el=document.getElementById('timer-display');
          if(el){el.textContent='00:00:00';el.className='timer-display done';}
          showToast('⏰ Print job complete!','success');
          return;
        }
        S.timer.seconds--;
      }else{
        S.timer.seconds++;
      }
      const h=Math.floor(S.timer.seconds/3600);
      const m=Math.floor((S.timer.seconds%3600)/60);
      const s=S.timer.seconds%60;
      const p=n=>String(n).padStart(2,'0');
      const el=document.getElementById('timer-display');
      if(el) el.textContent=`${p(h)}:${p(m)}:${p(s)}`;
    },1000);
    const startBtn=document.getElementById('timer-start-btn');
    if(startBtn){startBtn.textContent='⏸ Pause';startBtn.className='btn btn-ghost';}
  }else{
    clearInterval(timerInterval);
    const startBtn=document.getElementById('timer-start-btn');
    if(startBtn){startBtn.textContent='▶ Start';startBtn.className='btn btn-primary';}
  }
}
function resetTimer(){
  clearInterval(timerInterval);
  S.timer={running:false,seconds:0,label:'',countdown:false,countdownFrom:0};
  render();
}
function setTimerPreset(secs){
  clearInterval(timerInterval);
  S.timer.seconds=secs;
  S.timer.countdown=true;
  S.timer.countdownFrom=secs;
  S.timer.running=false;
  render();
}
function startStopwatch(){
  clearInterval(timerInterval);
  S.timer.seconds=0;
  S.timer.countdown=false;
  S.timer.countdownFrom=0;
  S.timer.running=false;
  render();
}

function applyCustomTimer(){
  const h=parseInt(document.getElementById('ct-hours').value)||0;

// P&L MONTHLY SUMMARY
// ═══════════════════════════════════════════════
function renderPL(){
  const now=new Date();
  const mo=now.getMonth(); const yr=now.getFullYear();
  const moOrders=S.orders.filter(o=>{const d=new Date(o.date);return d.getMonth()===mo&&d.getFullYear()===yr;});
  const rev=moOrders.reduce((s,o)=>s+o.revenue,0);
  const matCost=moOrders.reduce((s,o)=>s+o.cost,0);
  const moExp=S.expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===mo&&d.getFullYear()===yr;});
  const expTotal=moExp.reduce((s,e)=>s+e.amount,0);
  const gross=rev-matCost;
  const net=gross-expTotal;
  const margin=rev?Math.round(net/rev*100):0;
  const moName=now.toLocaleString('default',{month:'long',year:'numeric'});

  // expense breakdown by category
  const expByCat={};
  moExp.forEach(e=>{expByCat[e.cat]=(expByCat[e.cat]||0)+e.amount;});

  return`
    <h2 style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px">P&L — ${moName}</h2>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-size:13px">
        <span style="color:var(--text-dim)">Revenue</span><span style="color:var(--accent);font-weight:700">${fmt(rev)}</span>
      </div>
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-size:13px">
        <span style="color:var(--text-dim)">Material Costs</span><span style="color:var(--red)">−${fmt(matCost)}</span>
      </div>
      <div style="padding:12px 16px;border-bottom:2px solid var(--border);display:flex;justify-content:space-between;font-size:13px;font-weight:700">
        <span>Gross Profit</span><span style="color:${gross>=0?'var(--green)':'var(--red)'}">${fmt(gross)}</span>
      </div>
      ${Object.entries(expByCat).map(([cat,amt])=>`
      <div style="padding:8px 16px 8px 28px;border-bottom:1px solid #ffffff06;display:flex;justify-content:space-between;font-size:12px">
        <span style="color:var(--text-muted)">${cat}</span><span style="color:var(--red)">−${fmt(amt)}</span>
      </div>`).join('')}
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-size:13px">
        <span style="color:var(--text-dim)">Total Expenses</span><span style="color:var(--red)">−${fmt(expTotal)}</span>
      </div>
      <div style="padding:16px;display:flex;justify-content:space-between;font-size:15px;font-weight:700;background:${net>=0?'#2ecc7111':'#e74c3c11'}">
        <span>Net Profit</span><span style="color:${net>=0?'var(--green)':'var(--red)'}">${fmt(net)} <span style="font-size:11px;font-weight:400">(${margin}% margin)</span></span>
      </div>
    </div>
    <button class="btn btn-ghost" style="width:100%" onclick="exportCSV()">📊 Export to CSV</button>`;
}

// ═══════════════════════════════════════════════
// CSV EXPORT
// ═══════════════════════════════════════════════
function exportCSV(){
  const headers=['Date','Client','Item','Qty','Material','Revenue','Cost','Profit','Print Time','Status','Due Date','Notes'];
  const rows=S.orders.map(o=>[
    o.date, o.client, `"${o.item}"`, o.qty, o.material||'',
    o.revenue, o.cost, o.revenue-o.cost,
    o.printTime||0, o.status, o.dueDate||'',
    `"${(o.notes||'').replace(/"/g,"'")}"`
  ]);
  const csv=[headers.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`printbase-orders-${new Date().toISOString().slice(0,10)}.csv`; a.click();
  showToast('CSV exported ✓','success');
}

      return`<div class="insight-card" style="border:1px solid ${borders[ins.type]}44;border-left:3px solid ${borders[ins.type]}">

  return`

    ${keySet?`

function applyApiKey(override){
  let val;
  if(override!==undefined){
    val=override;
  } else {
    val=(document.getElementById('api-key-input')?.value?.trim()||document.getElementById('s-apikey')?.value?.trim()||'');
  }
  S.apiKey=val; try{localStorage.setItem('pb_apikey',val);}catch(e){}
  S.showApiKey=false; render();
  showToast(val?'API key saved ✓':'API key removed','success');
}

async function fetchInsights(){
  S.aiLoading=true; S.aiInsights=[]; render();
  const c=C();
  const ctx=`You are an AI analyst for a 3D printing business. Return exactly 4 insights as JSON array.
Each: { "type": "warning"|"tip"|"trend"|"alert", "insight": "string" }
Be specific. Return ONLY valid JSON, no markdown.
INVENTORY: ${S.filaments.map(f=>`${f.name}: ${f.weight}g/${f.total}g ($${f.cost}/kg)`).join(', ')||'none'}
PRINTED STOCK: ${S.printedItems.map(p=>`${p.name}: ${p.qty} units @$${p.price}`).join(', ')||'none'}
ORDERS: ${S.orders.slice(0,10).map(o=>`${o.client} - ${o.item} qty${o.qty} rev$${o.revenue} cost$${o.cost} ${o.status}`).join('; ')||'none'}
EXPENSES: ${S.expenses.map(e=>`${e.desc} $${e.amount}`).join(', ')||'none'}
FINANCIALS: Revenue ${fmt(c.rev)}, Profit ${fmt(c.profit)}, Margin ${c.margin}%, Expenses ${fmt(c.expTotal)}, Active orders: ${c.active}
CUSTOMERS: ${S.customers.length}, Top client: ${getTopClient().name||'none'}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:ctx}]})
    });
    const data=await res.json();
    const text=data.content?.map(b=>b.text||'').join('')||'[]';
    S.aiInsights=JSON.parse(text.replace(/```json|```/g,'').trim());
  }catch(e){S.aiInsights=[{type:'alert',insight:'Could not load insights. Check your API key and connection.'}];}
  S.aiLoading=false; render();
}

async function sendChat(){
  const input=document.getElementById('chat-input');
  const msg=input?.value?.trim();
  if(!msg||S.chatLoading) return;
  input.value='';
  S.chatMessages.push({role:'user',content:msg});
  S.chatLoading=true; render(); scrollChat();
  const c=C();
  const sys=`You are a helpful AI assistant for a 3D printing business.
Data: Revenue ${fmt(c.rev)}, Profit ${fmt(c.profit)}, Margin ${c.margin}%, Active orders: ${c.active}.
Filaments: ${S.filaments.map(f=>`${f.name} ${Math.round(f.weight/f.total*100)}%`).join(', ')||'none'}.
Customers: ${S.customers.length}. Expenses: ${fmt(c.expTotal)}.
Keep answers concise and practical. No markdown formatting.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:S.chatMessages})
    });
    const data=await res.json();
    S.chatMessages.push({role:'assistant',content:data.content?.map(b=>b.text||'').join('')||'No response.'});
  }catch(e){S.chatMessages.push({role:'assistant',content:'Error. Check connection.'});}
  S.chatLoading=false; render(); scrollChat();
}
function scrollChat(){setTimeout(()=>{const b=document.getElementById('chat-box');if(b)b.scrollTop=b.scrollHeight;},50);}
