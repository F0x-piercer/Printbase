<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#ff6b2b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PrintBase"/>
<title>PrintBase Pro</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #ff6b2b;
    --accent-dim: #ff6b2b22;
    --accent-glow: #ff6b2b44;
    --blue: #4a9eff;
    --green: #2ecc71;
    --yellow: #f1c40f;
    --red: #e74c3c;
    --text: #e8e8f0;
    --text-dim: #8888aa;
    --text-muted: #55556a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* LAYOUT */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  #header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; height: 56px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
  #content { flex: 1; overflow-y: auto; padding: 20px 16px 100px; }
  #nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px; background: none; border: none; cursor: pointer; color: var(--text-dim); font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.5px; transition: color 0.15s; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn .icon { font-size: 20px; line-height: 1; }

  /* HEADER */
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: grid; place-items: center; font-size: 16px; flex-shrink: 0; }
  .logo-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }
  .logo-tag { color: var(--text-muted); font-size: 9px; letter-spacing: 2px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .low-stock-badge { background: #f1c40f22; border: 1px solid #f1c40f44; border-radius: 6px; padding: 3px 8px; color: var(--yellow); font-size: 10px; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); display: grid; place-items: center; font-size: 13px; font-weight: 700; color: #fff; }

  /* SECTIONS */
  .section-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; }
  .section-sub { color: var(--text-dim); font-size: 11px; margin-bottom: 20px; }

  /* STAT CARDS */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; position: relative; overflow: hidden; }
  .stat-card::after { content: ''; position: absolute; top: 0; right: 0; width: 60px; height: 60px; border-radius: 0 10px 0 60px; }
  .stat-label { color: var(--text-dim); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; }
  .stat-sub { color: var(--text-muted); font-size: 10px; margin-top: 3px; }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .card-title { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 14px; }

  /* ORDERS */
  .order-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border)22; }
  .order-row:last-child { border-bottom: none; }
  .order-client { font-size: 13px; color: var(--text); margin-bottom: 2px; }
  .order-item { font-size: 11px; color: var(--text-dim); }
  .order-revenue { color: var(--accent); font-weight: 700; font-size: 14px; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-family: 'Space Mono', monospace; white-space: nowrap; display: inline-block; margin-top: 4px; }
  .badge-completed { background: #2ecc7122; color: var(--green); }
  .badge-inprogress { background: #4a9eff22; color: var(--blue); }
  .badge-pending { background: #f1c40f22; color: var(--yellow); }

  /* FILAMENT */
  .filament-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .filament-card.low { border-color: var(--red)44; }
  .filament-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .filament-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .filament-name { font-size: 14px; font-weight: 700; font-family: 'Syne', sans-serif; }
  .filament-brand { font-size: 11px; color: var(--text-dim); }
  .low-tag { margin-left: auto; font-size: 9px; color: var(--red); background: #e74c3c22; padding: 2px 7px; border-radius: 10px; }
  .bar-track { height: 5px; background: var(--border); border-radius: 3px; margin: 6px 0 4px; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .filament-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); }
  .filament-meta .cost { color: var(--accent); }

  /* RANGE SLIDER */
  input[type=range] { width: 100%; margin-top: 10px; cursor: pointer; -webkit-appearance: none; height: 4px; border-radius: 2px; background: var(--border); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 6px var(--accent)88; }
  .slider-label { font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 4px; }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
  .form-input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 9px 12px; font-size: 13px; font-family: 'Space Mono', monospace; width: 100%; outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--accent); }
  select.form-input { cursor: pointer; }
  .form-actions { display: flex; gap: 8px; margin-top: 14px; }

  /* BUTTONS */
  .btn { border: none; border-radius: 8px; padding: 11px 18px; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:active { transform: scale(0.97); background: #e05a1f; }
  .btn-primary:disabled { background: var(--border); cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost:active { background: var(--surface2); }
  .btn-sm { padding: 8px 14px; font-size: 11px; }

  /* PANEL */
  .panel { background: var(--surface); border: 1px solid var(--accent-glow); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .panel-title { font-size: 10px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 14px; }

  /* SECTION HEADER */
  .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px; }

  /* AI */
  .insight-card { background: var(--surface); border-radius: 8px; padding: 13px 15px; margin-bottom: 10px; display: flex; gap: 10px; align-items: flex-start; }
  .insight-text { font-size: 13px; line-height: 1.6; }
  .ai-empty { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 13px; }
  .ai-empty .big { font-size: 36px; display: block; margin-bottom: 12px; }

  /* CHAT */
  .chat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; height: 300px; overflow-y: auto; margin-bottom: 10px; }
  .msg { display: flex; margin-bottom: 12px; }
  .msg.user { justify-content: flex-end; }
  .msg-bubble { max-width: 85%; padding: 10px 13px; border-radius: 12px; font-size: 12.5px; line-height: 1.6; }
  .msg.user .msg-bubble { background: var(--accent-dim); border: 1px solid var(--accent-glow); color: var(--accent); border-radius: 12px 12px 2px 12px; }
  .msg.ai .msg-bubble { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 12px 12px 12px 2px; }
  .chat-input-row { display: flex; gap: 8px; }
  textarea.form-input { resize: none; line-height: 1.5; }
  .send-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 0 16px; font-size: 18px; cursor: pointer; align-self: stretch; transition: all 0.15s; flex-shrink: 0; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }
  .typing { display: flex; gap: 4px; padding: 8px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1s infinite; }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* FULL TABLE */
  .orders-list { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .order-full-row { padding: 14px 16px; border-bottom: 1px solid var(--border)33; display: flex; flex-direction: column; gap: 6px; }
  .order-full-row:last-child { border-bottom: none; }
  .order-top { display: flex; justify-content: space-between; align-items: center; }
  .order-bottom { display: flex; gap: 12px; font-size: 11px; color: var(--text-dim); }
  .order-profit { font-size: 12px; }

  /* COLOR INPUT */
  input[type=color] { padding: 2px; height: 38px; cursor: pointer; }

  /* DELETE */
  .del-btn { background: transparent; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 4px 6px; border-radius: 6px; line-height: 1; transition: all 0.15s; flex-shrink: 0; }
  .del-btn:active { background: var(--red)22; color: var(--red); transform: scale(0.9); }

  /* CONFIRM MODAL */
  .modal-bg { position: fixed; inset: 0; background: #000000aa; z-index: 300; display: flex; align-items: flex-end; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 24px 20px 32px; width: 100%; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; margin-bottom: 8px; }
  .modal-sub { color: var(--text-dim); font-size: 12px; margin-bottom: 20px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 10px; }
  .btn-danger { background: var(--red); color: #fff; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <span class="logo-name">PRINTBASE</span>
      <span class="logo-tag">PRO</span>
    </div>
    <div class="header-right">
      <div id="low-stock-badge" class="low-stock-badge" style="display:none"></div>
      <div class="avatar">A</div>
    </div>
  </div>

  <div id="content"></div>

  <nav id="nav">
    <button class="nav-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">
      <span class="icon">⊞</span>DASH
    </button>
    <button class="nav-btn" data-tab="orders" onclick="switchTab('orders')">
      <span class="icon">📋</span>ORDERS
    </button>
    <button class="nav-btn" data-tab="inventory" onclick="switchTab('inventory')">
      <span class="icon">🧵</span>FILAMENT
    </button>
    <button class="nav-btn" data-tab="printed" onclick="switchTab('printed')">
      <span class="icon">📦</span>PRINTED
    </button>
    <button class="nav-btn" data-tab="ai" onclick="switchTab('ai')">
      <span class="icon">✦</span>AI
    </button>
  </nav>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────
let state = {
  tab: 'dashboard',
  filaments: [],
  orders: [],
  printedItems: [],
  showAddOrder: false,
  showAddFilament: false,
  showAddPrinted: false,
  aiInsights: [],
  aiLoading: false,
  chatMessages: [],
  chatLoading: false,
  apiKey: '',
  showApiKey: false,
};

// ─── COMPUTED ─────────────────────────────────────────────
function computed() {
  const rev  = state.orders.reduce((s,o)=>s+o.revenue,0);
  const cost = state.orders.reduce((s,o)=>s+o.cost,0);
  const profit = rev - cost;
  const margin = rev ? Math.round(profit/rev*100) : 0;
  const active = state.orders.filter(o=>o.status!=='Completed').length;
  const low = state.filaments.filter(f=>f.weight/f.total<0.3);
  return { rev, cost, profit, margin, active, low };
}

// ─── CONFIRM MODAL ────────────────────────────────────────
function showConfirm(title, sub, onConfirm) {
  const existing = document.getElementById('modal-bg');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'modal-bg'; el.id = 'modal-bg';
  el.innerHTML = `
    <div class="modal">
      <div class="modal-title">${title}</div>
      <div class="modal-sub">${sub}</div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="modal-confirm" style="flex:1">Delete</button>
        <button class="btn btn-ghost" id="modal-cancel" style="flex:1">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(el);
  document.getElementById('modal-confirm').onclick = () => { el.remove(); onConfirm(); };
  document.getElementById('modal-cancel').onclick = () => el.remove();
  el.onclick = (e) => { if (e.target === el) el.remove(); };
}

function deleteOrder(id) {
  const o = state.orders.find(x=>x.id===id);
  showConfirm('Delete Order', `Remove order from <strong>${o?.client||'this client'}</strong>? This can't be undone.`, () => {
    state.orders = state.orders.filter(x=>x.id!==id);
    save(); render();
  });
}

function deleteFilament(id) {
  const f = state.filaments.find(x=>x.id===id);
  showConfirm('Delete Material', `Remove <strong>${f?.name||'this material'}</strong> from inventory? This can't be undone.`, () => {
    state.filaments = state.filaments.filter(x=>x.id!==id);
    save(); render();
  });
}

// ─── PERSIST ──────────────────────────────────────────────
function save() {
  try { localStorage.setItem('pb_state', JSON.stringify({ filaments: state.filaments, orders: state.orders, printedItems: state.printedItems })); } catch(e){}
}
function load() {
  try {
    const s = JSON.parse(localStorage.getItem('pb_state'));
    if (s) { state.filaments = s.filaments; state.orders = s.orders; state.printedItems = s.printedItems || []; }
  } catch(e){}
  try { state.apiKey = localStorage.getItem('pb_apikey') || ''; } catch(e){}
}
function saveApiKey(key) {
  state.apiKey = key;
  try { localStorage.setItem('pb_apikey', key); } catch(e){}
}

// ─── RENDER ───────────────────────────────────────────────
function render() {
  const c = computed();
  // Update low stock badge
  const badge = document.getElementById('low-stock-badge');
  if (c.low.length > 0) { badge.style.display=''; badge.textContent=`⚠ ${c.low.length} low`; }
  else { badge.style.display='none'; }

  const content = document.getElementById('content');
  if      (state.tab==='dashboard') content.innerHTML = renderDashboard(c);
  else if (state.tab==='orders')    content.innerHTML = renderOrders(c);
  else if (state.tab==='inventory') content.innerHTML = renderInventory(c);
  else if (state.tab==='printed')   content.innerHTML = renderPrinted(c);
  else if (state.tab==='ai')        content.innerHTML = renderAI(c);

  attachEvents();
}

// ─── DASHBOARD ────────────────────────────────────────────
function renderDashboard(c) {
  const recentOrders = state.orders.length === 0
    ? `<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:12px">No orders yet</div>`
    : state.orders.slice(0,4).map(o=>`
    <div class="order-row">
      <div><div class="order-client">${o.client}</div><div class="order-item">${o.item}</div></div>
      <div style="text-align:right"><div class="order-revenue">$${o.revenue}</div>${badge(o.status)}</div>
    </div>`).join('');

  const filBars = state.filaments.length === 0
    ? `<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:12px">No materials added yet</div>`
    : state.filaments.map(f=>{
    const pct=Math.round(f.weight/f.total*100);
    const bc=pct<30?'var(--red)':pct<60?'var(--yellow)':'var(--green)';
    return `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <div style="display:flex;align-items:center;gap:7px">
          <div style="width:9px;height:9px;border-radius:50%;background:${f.color};border:1px solid var(--border)"></div>
          <span style="font-size:11px">${f.name}</span>
        </div>
        <span style="font-size:10px;color:${pct<30?'var(--red)':'var(--text-dim)'}">${f.weight}g (${pct}%)</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${bc}"></div></div>
    </div>`;
  }).join('');

  return `
    <h1 class="section-title">Overview</h1>
    <p class="section-sub">All-time business performance</p>
    <div class="stats-row">
      ${statCard('Total Revenue', state.orders.length ? '$'+c.rev.toLocaleString() : '$0','all orders','var(--accent)')}
      ${statCard('Net Profit', state.orders.length ? '$'+c.profit.toLocaleString() : '$0', state.orders.length ? c.margin+'% margin' : '0% margin','var(--green)')}
      ${statCard('Active Orders', c.active || '0','in progress + pending','var(--blue)')}
      ${statCard('Materials', state.filaments.length || '0', c.low.length+' low stock','var(--yellow)')}
    </div>
    <div class="card"><div class="card-title">Recent Orders</div>${recentOrders}</div>
    <div class="card"><div class="card-title">Filament Levels</div>${filBars}</div>
    <div class="card">
      <div class="card-title">Printed Stock</div>
      ${state.printedItems.length === 0
        ? `<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:12px">No printed items in stock</div>`
        : state.printedItems.slice(0,4).map(p=>`
          <div class="order-row">
            <div><div class="order-client">${p.name}</div><div class="order-item">${p.material} · $${p.price} each</div></div>
            <div style="text-align:right">
              <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:${p.qty<=p.lowAt?'var(--red)':'var(--blue)'}">${p.qty}</div>
              <div style="font-size:10px;color:var(--text-muted)">in stock</div>
            </div>
          </div>`).join('')
      }
    </div>`;
}

function statCard(label,value,sub,accent) {
  return `<div class="stat-card" style="border-left:3px solid ${accent}">
    <div class="stat-label">${label}</div>
    <div class="stat-value" style="color:${accent}">${value}</div>
    ${sub?`<div class="stat-sub">${sub}</div>`:''}
  </div>`;
}

function badge(status) {
  const map = {'Completed':'completed','In Progress':'inprogress','Pending':'pending'};
  const labels = {'Completed':'● Done','In Progress':'◐ Active','Pending':'○ Pending'};
  return `<span class="badge badge-${map[status]||'pending'}">${labels[status]||status}</span>`;
}

// ─── ORDERS ───────────────────────────────────────────────
function renderOrders(c) {
  const form = state.showAddOrder ? `
    <div class="panel">
      <div class="panel-title">New Order</div>
      <div class="form-grid">
        <div class="form-group full"><label class="form-label">Client</label><input class="form-input" id="no-client" type="text" placeholder="Client name"/></div>
        <div class="form-group full"><label class="form-label">Item</label><input class="form-input" id="no-item" type="text" placeholder="Item description"/></div>
        <div class="form-group"><label class="form-label">Qty</label><input class="form-input" id="no-qty" type="number" value="1" min="1"/></div>
        <div class="form-group"><label class="form-label">Material</label>
          <select class="form-input" id="no-mat">${state.filaments.map(f=>`<option>${f.name}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label class="form-label">Revenue ($)</label><input class="form-input" id="no-rev" type="number" value="0"/></div>
        <div class="form-group"><label class="form-label">Cost ($)</label><input class="form-input" id="no-cost" type="number" value="0"/></div>
        <div class="form-group full"><label class="form-label">Status</label>
          <select class="form-input" id="no-status"><option>Pending</option><option>In Progress</option><option>Completed</option></select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary btn-sm" onclick="addOrder()">Add Order</button>
        <button class="btn btn-ghost btn-sm" onclick="state.showAddOrder=false;render()">Cancel</button>
      </div>
    </div>` : '';

  const rows = state.orders.length === 0
    ? `<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:12px">No orders yet.<br>Tap <strong style="color:var(--accent)">+ New</strong> to add your first order.</div>`
    : state.orders.map(o=>`
    <div class="order-full-row">
      <div class="order-top">
        <div><div class="order-client">${o.client}</div><div class="order-item">${o.item} · qty ${o.qty}</div></div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="text-align:right"><div class="order-revenue">$${o.revenue}</div>${badge(o.status)}</div>
          <button class="del-btn" onclick="deleteOrder(${o.id})" title="Delete order">🗑</button>
        </div>
      </div>
      <div class="order-bottom">
        <span>${o.material}</span>
        <span class="order-profit" style="color:${o.revenue-o.cost>0?'var(--green)':'var(--red)'}">profit: $${o.revenue-o.cost}</span>
        <span>${o.date}</span>
      </div>
    </div>`).join('');

  return `
    <div class="section-header">
      <div><h1 class="section-title">Orders</h1><p class="section-sub">${state.orders.length} total</p></div>
      <button class="btn btn-primary btn-sm" onclick="state.showAddOrder=!state.showAddOrder;render()">+ New</button>
    </div>
    ${form}
    <div class="orders-list">${rows}</div>
    <div style="margin-top:16px">
      <div class="stats-row">
        ${statCard('Revenue', state.orders.length ? '$'+c.rev : '$0','','var(--accent)')}
        ${statCard('Profit', state.orders.length ? '$'+c.profit : '$0', state.orders.length ? c.margin+'% margin' : '0% margin','var(--green)')}
      </div>
    </div>`;
}

function addOrder() {
  const o = {
    id: Date.now(),
    client: document.getElementById('no-client').value || 'Unknown',
    item:   document.getElementById('no-item').value || 'Item',
    qty:    +document.getElementById('no-qty').value || 1,
    material: document.getElementById('no-mat').value,
    revenue: +document.getElementById('no-rev').value || 0,
    cost:    +document.getElementById('no-cost').value || 0,
    date: new Date().toISOString().slice(0,10),
    status: document.getElementById('no-status').value,
  };
  state.orders.unshift(o);
  state.showAddOrder = false;
  save(); render();
}

// ─── INVENTORY ────────────────────────────────────────────
function renderInventory(c) {
  const form = state.showAddFilament ? `
    <div class="panel">
      <div class="panel-title">Add Material</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="nf-name" type="text" placeholder="PLA White"/></div>
        <div class="form-group"><label class="form-label">Brand</label><input class="form-input" id="nf-brand" type="text" placeholder="Polymaker"/></div>
        <div class="form-group"><label class="form-label">Current (g)</label><input class="form-input" id="nf-weight" type="number" value="1000"/></div>
        <div class="form-group"><label class="form-label">Total (g)</label><input class="form-input" id="nf-total" type="number" value="1000"/></div>
        <div class="form-group"><label class="form-label">Cost ($/kg)</label><input class="form-input" id="nf-cost" type="number" value="25"/></div>
        <div class="form-group"><label class="form-label">Color</label><input class="form-input" id="nf-color" type="color" value="#ff6b2b"/></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary btn-sm" onclick="addFilament()">Add</button>
        <button class="btn btn-ghost btn-sm" onclick="state.showAddFilament=false;render()">Cancel</button>
      </div>
    </div>` : '';

  const cards = state.filaments.length === 0
    ? `<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:12px">No materials yet.<br>Tap <strong style="color:var(--accent)">+ Add</strong> to add your first filament.</div>`
    : state.filaments.map(f=>{
    const pct=Math.round(f.weight/f.total*100);
    const bc=pct<30?'var(--red)':pct<60?'var(--yellow)':'var(--green)';
    return `
      <div class="filament-card${pct<30?' low':''}">
        <div class="filament-header">
          <div class="filament-dot" style="background:${f.color};box-shadow:0 0 6px ${f.color}88"></div>
          <div><div class="filament-name">${f.name}</div><div class="filament-brand">${f.brand}</div></div>
          ${pct<30?'<span class="low-tag">LOW STOCK</span>':''}
          <button class="del-btn" onclick="deleteFilament(${f.id})" title="Delete material" style="margin-left:auto">🗑</button>
        </div>
        <div class="filament-meta"><span>${f.weight}g / ${f.total}g</span><span>${pct}% remaining</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${bc}"></div></div>
        <div class="filament-meta"><span style="color:${bc}">${pct<30?'⚠ Reorder soon':pct<60?'Running low':'Good'}</span><span class="cost">$${f.cost}/kg</span></div>
        <input type="range" min="0" max="${f.total}" value="${f.weight}" oninput="updateFilament(${f.id},this.value)" style="accent-color:${bc}"/>
        <div class="slider-label">drag to update weight</div>
      </div>`;
  }).join('');

  return `
    <div class="section-header">
      <div><h1 class="section-title">Inventory</h1><p class="section-sub">${state.filaments.length} materials · ${c.low.length} low</p></div>
      <button class="btn btn-primary btn-sm" onclick="state.showAddFilament=!state.showAddFilament;render()">+ Add</button>
    </div>
    ${form}${cards}`;
}

function updateFilament(id, val) {
  state.filaments = state.filaments.map(f=>f.id===id?{...f,weight:+val}:f);
  // Update bar without full re-render
  save();
  const c = computed();
  const badge2 = document.getElementById('low-stock-badge');
  if (c.low.length>0) { badge2.style.display=''; badge2.textContent=`⚠ ${c.low.length} low`; }
  else badge2.style.display='none';
}

function addFilament() {
  const f = {
    id: Date.now(),
    name:   document.getElementById('nf-name').value || 'New Filament',
    brand:  document.getElementById('nf-brand').value || 'Unknown',
    weight: +document.getElementById('nf-weight').value || 1000,
    total:  +document.getElementById('nf-total').value || 1000,
    cost:   +document.getElementById('nf-cost').value || 25,
    color:  document.getElementById('nf-color').value || '#ff6b2b',
  };
  state.filaments.push(f);
  state.showAddFilament = false;
  save(); render();
}

// ─── PRINTED STOCK ────────────────────────────────────────
function renderPrinted(c) {
  const form = state.showAddPrinted ? `
    <div class="panel">
      <div class="panel-title">Add Printed Item</div>
      <div class="form-grid">
        <div class="form-group full"><label class="form-label">Item Name</label><input class="form-input" id="np-name" type="text" placeholder="e.g. Phone Stand"/></div>
        <div class="form-group"><label class="form-label">Qty in Stock</label><input class="form-input" id="np-qty" type="number" value="1" min="0"/></div>
        <div class="form-group"><label class="form-label">Sale Price ($)</label><input class="form-input" id="np-price" type="number" value="0"/></div>
        <div class="form-group"><label class="form-label">Material Used</label>
          <select class="form-input" id="np-mat">
            <option value="">— None —</option>
            ${state.filaments.map(f=>`<option>${f.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Low Stock Alert</label><input class="form-input" id="np-low" type="number" value="2" min="0"/></div>
        <div class="form-group"><label class="form-label">Color</label><input class="form-input" id="np-color" type="color" value="#ff6b2b"/></div>
        <div class="form-group full"><label class="form-label">Notes (optional)</label><input class="form-input" id="np-notes" type="text" placeholder="e.g. popular item, made to order"/></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary btn-sm" onclick="addPrintedItem()">Add Item</button>
        <button class="btn btn-ghost btn-sm" onclick="state.showAddPrinted=false;render()">Cancel</button>
      </div>
    </div>` : '';

  const totalItems = state.printedItems.reduce((s,p)=>s+p.qty, 0);
  const totalValue = state.printedItems.reduce((s,p)=>s+(p.qty*p.price), 0);
  const lowItems = state.printedItems.filter(p=>p.qty<=p.lowAt);

  const cards = state.printedItems.length === 0
    ? `<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:12px">No printed items yet.<br>Tap <strong style="color:var(--accent)">+ Add</strong> to track your printed stock.</div>`
    : state.printedItems.map(p=>{
        const isLow = p.qty <= p.lowAt;
        return `
        <div class="filament-card${isLow?' low':''}">
          <div class="filament-header">
            <div class="filament-dot" style="background:${p.color};box-shadow:0 0 6px ${p.color}88"></div>
            <div style="flex:1"><div class="filament-name">${p.name}</div><div class="filament-brand">${p.material||'No material'}</div></div>
            ${isLow?'<span class="low-tag">LOW STOCK</span>':''}
            <button class="del-btn" onclick="deletePrinted(${p.id})">🗑</button>
          </div>
          ${p.notes?`<div style="font-size:11px;color:var(--text-muted);margin-bottom:10px;font-style:italic">${p.notes}</div>`:''}
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div>
              <div style="font-size:11px;color:var(--text-dim);margin-bottom:3px">IN STOCK</div>
              <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:${isLow?'var(--red)':'var(--blue)'};line-height:1">${p.qty}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:11px;color:var(--text-dim);margin-bottom:3px">SALE PRICE</div>
              <div style="font-size:20px;font-weight:700;color:var(--accent)">$${p.price}</div>
              <div style="font-size:10px;color:var(--text-muted)">stock value: $${p.qty*p.price}</div>
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost btn-sm" style="flex:1" onclick="adjustQty(${p.id},-1)">− Remove</button>
            <button class="btn btn-primary btn-sm" style="flex:1" onclick="adjustQty(${p.id},1)">+ Add</button>
          </div>
          <div style="font-size:10px;color:var(--text-muted);text-align:center;margin-top:6px">Alert when ≤ ${p.lowAt} units</div>
        </div>`;
      }).join('');

  return `
    <div class="section-header">
      <div><h1 class="section-title">Printed Stock</h1><p class="section-sub">${totalItems} items · $${totalValue} value${lowItems.length?` · <span style="color:var(--red)">${lowItems.length} low</span>`:''}</p></div>
      <button class="btn btn-primary btn-sm" onclick="state.showAddPrinted=!state.showAddPrinted;render()">+ Add</button>
    </div>
    ${form}
    ${state.printedItems.length > 0 ? `
    <div class="stats-row" style="margin-bottom:16px">
      ${statCard('Total Units', totalItems, 'across all items', 'var(--blue)')}
      ${statCard('Stock Value', '$'+totalValue, 'at sale price', 'var(--green)')}
    </div>` : ''}
    ${cards}`;
}

function addPrintedItem() {
  const p = {
    id: Date.now(),
    name:     document.getElementById('np-name').value || 'Unnamed Item',
    qty:      +document.getElementById('np-qty').value || 0,
    price:    +document.getElementById('np-price').value || 0,
    material: document.getElementById('np-mat').value || '',
    lowAt:    +document.getElementById('np-low').value ?? 2,
    color:    document.getElementById('np-color').value || '#ff6b2b',
    notes:    document.getElementById('np-notes').value || '',
  };
  state.printedItems.push(p);
  state.showAddPrinted = false;
  save(); render();
}

function adjustQty(id, delta) {
  state.printedItems = state.printedItems.map(p=>
    p.id===id ? {...p, qty: Math.max(0, p.qty+delta)} : p
  );
  save(); render();
}

function deletePrinted(id) {
  const p = state.printedItems.find(x=>x.id===id);
  showConfirm('Delete Item', `Remove <strong>${p?.name||'this item'}</strong> from printed stock?`, () => {
    state.printedItems = state.printedItems.filter(x=>x.id!==id);
    save(); render();
  });
}

// ─── AI ───────────────────────────────────────────────────
function renderAI(c) {
  const keySet = state.apiKey && state.apiKey.startsWith('sk-ant-');

  const keyPanel = `
    <div class="card" style="border-color:${keySet?'var(--green)44':'var(--accent-glow)'}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="card-title" style="margin:0;color:${keySet?'var(--green)':'var(--accent)'}">
          ${keySet ? '✓ API KEY CONNECTED' : '⚠ API KEY REQUIRED'}
        </div>
        ${keySet ? `<button class="btn btn-ghost btn-sm" onclick="state.showApiKey=!state.showApiKey;render()">
          ${state.showApiKey?'Hide':'Change'}
        </button>` : ''}
      </div>
      ${!keySet || state.showApiKey ? `
        <p style="font-size:11px;color:var(--text-dim);margin-bottom:12px;line-height:1.6">
          Enter your Anthropic API key to enable AI features.<br>
          Get one free at <strong style="color:var(--accent)">console.anthropic.com</strong>
        </p>
        <div style="display:flex;gap:8px">
          <input class="form-input" id="api-key-input" type="password"
            placeholder="sk-ant-..."
            value="${state.apiKey}"
            style="flex:1;font-size:12px"
          />
          <button class="btn btn-primary btn-sm" onclick="applyApiKey()">Save</button>
        </div>
        ${keySet ? `<button class="btn btn-ghost btn-sm" onclick="applyApiKey('');state.showApiKey=false;" style="margin-top:8px;width:100%;color:var(--red);border-color:var(--red)44">Remove Key</button>` : ''}
      ` : `<p style="font-size:11px;color:var(--text-dim)">Key saved on this device only. Never shared.</p>`}
    </div>`;

  const insights = !keySet
    ? ''
    : state.aiLoading
    ? `<div class="card ai-empty"><span class="big" style="animation:bounce 1s infinite;display:inline-block">⬡</span><br>Analyzing your business...</div>`
    : state.aiInsights.length === 0
    ? `<div class="card ai-empty"><span class="big">✦</span>Tap "Generate Insights" to get AI-powered analysis of your inventory, orders, and financials.</div>`
    : state.aiInsights.map(ins=>{
        const icons={warning:'⚠',tip:'💡',trend:'📈',alert:'🔴'};
        const borders={warning:'var(--yellow)',tip:'var(--blue)',trend:'var(--green)',alert:'var(--red)'};
        return `<div class="insight-card" style="border:1px solid ${borders[ins.type]}44;border-left:3px solid ${borders[ins.type]}">
          <span style="font-size:16px;flex-shrink:0;line-height:1.5">${icons[ins.type]||'💡'}</span>
          <p class="insight-text">${ins.insight}</p>
        </div>`;
      }).join('');

  const msgs = state.chatMessages.map(m=>`
    <div class="msg ${m.role==='user'?'user':'ai'}">
      <div class="msg-bubble">${m.content.replace(/\n/g,'<br>')}</div>
    </div>`).join('');

  const typing = state.chatLoading
    ? `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>` : '';

  return `
    <h1 class="section-title">AI Assistant</h1>
    <p class="section-sub">Smart insights & business advisor</p>

    ${keyPanel}

    ${keySet ? `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase">Business Insights</span>
      <button class="btn btn-primary btn-sm" onclick="fetchInsights()" ${state.aiLoading?'disabled':''}>
        ${state.aiLoading?'Analyzing...':'✦ Generate'}
      </button>
    </div>
    ${insights}

    <div style="font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin:20px 0 10px">Advisor Chat</div>
    <div class="chat-box" id="chat-box">${msgs.length||typing?msgs+typing:'<div style="color:var(--text-muted);font-size:12px;text-align:center;margin-top:40px">Ask me about pricing, reorders, or strategy…</div>'}</div>
    <div class="chat-input-row">
      <textarea class="form-input" id="chat-input" rows="2" placeholder="e.g. How can I improve margins?"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendChat()">→</button>
    </div>` : ''}`;
}

function applyApiKey(override) {
  const val = override !== undefined ? override : (document.getElementById('api-key-input')?.value?.trim() || '');
  saveApiKey(val);
  state.showApiKey = false;
  render();
}

async function fetchInsights() {
  state.aiLoading = true;
  state.aiInsights = [];
  render();
  const c = computed();
  const ctx = `
You are an AI business analyst for a 3D printing business. Analyze this data and return exactly 4 insights as a JSON array.
Each has: { "type": "warning"|"tip"|"trend"|"alert", "insight": "string" }
Be specific and reference actual numbers. Return ONLY valid JSON array, no markdown.

INVENTORY:
${state.filaments.map(f=>`- ${f.name}: ${f.weight}g of ${f.total}g (${Math.round(f.weight/f.total*100)}%), $${f.cost}/kg`).join('\n')}

ORDERS:
${state.orders.map(o=>`- ${o.client}: ${o.item}, qty ${o.qty}, revenue $${o.revenue}, cost $${o.cost}, status: ${o.status}`).join('\n')}

FINANCIALS: Revenue $${c.rev}, Cost $${c.cost}, Profit $${c.profit}, Margin ${c.margin}%
Active: ${c.active}, Low stock: ${c.low.map(f=>f.name).join(', ')||'none'}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:ctx}] })
    });
    const data = await res.json();
    const text = data.content?.map(b=>b.text||'').join('')||'[]';
    state.aiInsights = JSON.parse(text.replace(/```json|```/g,'').trim());
  } catch(e) {
    state.aiInsights = [{ type:'alert', insight:'Could not load insights. Check your connection and try again.' }];
  }
  state.aiLoading = false;
  render();
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input?.value?.trim();
  if (!msg || state.chatLoading) return;
  input.value = '';
  state.chatMessages.push({ role:'user', content:msg });
  state.chatLoading = true;
  render();
  scrollChat();

  const c = computed();
  const sys = `You are a helpful AI business assistant for a 3D printing business.
Current: Revenue $${c.rev}, Profit $${c.profit}, Margin ${c.margin}%, Active orders: ${c.active}.
Inventory: ${state.filaments.map(f=>`${f.name} ${Math.round(f.weight/f.total*100)}%`).join(', ')}.
Keep answers concise and practical. No markdown formatting.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system:sys, messages:state.chatMessages })
    });
    const data = await res.json();
    const reply = data.content?.map(b=>b.text||'').join('')||'Sorry, no response.';
    state.chatMessages.push({ role:'assistant', content:reply });
  } catch(e) {
    state.chatMessages.push({ role:'assistant', content:'Error reaching AI. Check connection.' });
  }
  state.chatLoading = false;
  render();
  scrollChat();
}

function scrollChat() {
  setTimeout(()=>{ const b=document.getElementById('chat-box'); if(b) b.scrollTop=b.scrollHeight; },50);
}

// ─── NAV ──────────────────────────────────────────────────
function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  render();
  document.getElementById('content').scrollTop = 0;
}

function attachEvents() {}

// ─── INIT ─────────────────────────────────────────────────
load();
render();

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// Install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install button after 3s if not installed
  setTimeout(() => {
    if (deferredPrompt) {
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;bottom:80px;left:16px;right:16px;background:#12121a;border:1px solid #ff6b2b44;border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;z-index:200;font-size:12px;';
      banner.innerHTML = `<span style="color:#e8e8f0">📲 Install PrintBase as an app</span><button onclick="installApp()" style="background:#ff6b2b;color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-family:Space Mono,monospace;font-size:11px">Install</button>`;
      banner.id = 'install-banner';
      document.body.appendChild(banner);
    }
  }, 3000);
});

async function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    const b = document.getElementById('install-banner');
    if (b) b.remove();
  }
}
</script>
